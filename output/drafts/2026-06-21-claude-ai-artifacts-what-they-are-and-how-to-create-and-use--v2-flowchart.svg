<svg viewBox="0 0 820 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="arA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/></marker>
    <style>.lbl{font-size:15px;fill:#0f172a;font-weight:600}.sub{font-size:12px;fill:#475569}.edge{stroke:#475569;stroke-width:1.7;fill:none;marker-end:url(#ar)}.loop{stroke:#d97706;stroke-width:2;fill:none;stroke-dasharray:6 4;marker-end:url(#arA)}.tag{font-size:11px;font-weight:700}</style>
  </defs>
  <rect x="0" y="0" width="820" height="600" fill="#ffffff"/>
  <text x="410" y="40" text-anchor="middle" font-size="21" font-weight="800" fill="#0f172a">Claude Artifacts Workflow</text>
  <text x="410" y="62" text-anchor="middle" class="sub">Create, view, refine, and reuse</text>
  <rect x="270" y="86" width="360" height="66" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.7"/><text x="450" y="113" text-anchor="middle" class="lbl">1. Know Artifacts</text><text x="450" y="133" text-anchor="middle" class="sub">Interactive outputs Claude builds</text><path class="edge" d="M450,152 L450,184"/><rect x="270" y="184" width="360" height="66" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="1.7"/><text x="450" y="211" text-anchor="middle" class="lbl">2. Ask Claude</text><text x="450" y="231" text-anchor="middle" class="sub">Request a page, chart, or app</text><path class="edge" d="M450,250 L450,282"/><rect x="270" y="282" width="360" height="66" rx="12" fill="#faf5ff" stroke="#9333ea" stroke-width="1.7"/><text x="450" y="309" text-anchor="middle" class="lbl">3. Review Artifact</text><text x="450" y="329" text-anchor="middle" class="sub">Open and inspect the result</text><path class="edge" d="M450,348 L450,380"/><rect x="270" y="380" width="360" height="66" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.7"/><text x="450" y="407" text-anchor="middle" class="lbl">4. Refine Prompt</text><text x="450" y="427" text-anchor="middle" class="sub">Request edits or added features</text><path class="edge" d="M450,446 L450,478"/><rect x="270" y="478" width="360" height="66" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="1.7"/><text x="450" y="505" text-anchor="middle" class="lbl">5. Use or Share</text><text x="450" y="525" text-anchor="middle" class="sub">Reuse, copy, or present it</text><path class="loop" d="M270,413 C206,413 206,217 270,217"/><text x="194" y="315" text-anchor="middle" class="tag" fill="#d97706" transform="rotate(-90 194 315)">iterate</text>
</svg>